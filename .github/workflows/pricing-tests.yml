name: pricing-tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Ensure vitest present
        run: npm install -D vitest@^2
      - name: Run pricing-engine tests
        run: npx vitest run tests/pricing.spec.ts
